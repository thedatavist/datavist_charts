<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ashcroft: Regular Season vs Finals</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', Arial, sans-serif; padding: 24px; max-width: 800px; margin: 0 auto; background: #fff; color: #1a1a1a; }
  .footer { font-size: 10px; color: #B4B2A9; display: flex; justify-content: space-between; margin-top: 8px; }
  .legend { display: flex; gap: 20px; margin-bottom: 16px; font-size: 12px; color: #666; }
  .legend span { display: flex; align-items: center; gap: 6px; }
  .swatch { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
</style>
</head>
<body>
<p style="font-size:20px;font-weight:700;margin:1rem 0 4px;">When it matters most, Ashcroft turns elite</p>
<p style="font-size:13px;color:#666;margin:0 0 16px;">Average player rating, regular season vs finals, 2024 and 2025</p>
<div class="legend">
  <span><span class="swatch" style="background:#B5D4F4;border:2px solid #378ADD;"></span>Regular Season</span>
  <span><span class="swatch" style="background:#D85A30;border:2px solid #993C1D;"></span>Finals</span>
</div>
<div style="position:relative;width:100%;height:260px;"><canvas id="c"></canvas></div>
<div class="footer"><span>Visual: Darragh Murray</span><span>Source: fitzRoy</span></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const FONT="'Inter',Arial,sans-serif";
const seasons=['2024','2025'];
const regular=[7.27,11.7];
const finals=[14.08,18.88];
const dumbbellPlugin={id:'db',afterDatasetsDraw(chart){
  const{ctx,scales:{x,y}}=chart;
  ctx.save();
  [0,1].forEach(i=>{
    const yPos=y.getPixelForValue(i+1);
    const x1=x.getPixelForValue(regular[i]);
    const x2=x.getPixelForValue(finals[i]);
    ctx.strokeStyle='#B4B2A9';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(x1,yPos);ctx.lineTo(x2,yPos);ctx.stroke();
    ctx.fillStyle='#B5D4F4';ctx.strokeStyle='#378ADD';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(x1,yPos,9,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.fillStyle='#D85A30';ctx.strokeStyle='#993C1D';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(x2,yPos,9,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.fillStyle='#185FA5';ctx.font=`500 11px ${FONT}`;ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(regular[i].toFixed(1),x1,yPos+13);
    ctx.fillStyle='#993C1D';ctx.font=`500 11px ${FONT}`;ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(finals[i].toFixed(1),x2,yPos+13);
    ctx.fillStyle='#D85A30';ctx.font=`500 11px ${FONT}`;ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillText(`+${(finals[i]-regular[i]).toFixed(1)}`,x2+16,yPos);
    ctx.fillStyle='#888780';ctx.font=`500 13px ${FONT}`;ctx.textAlign='right';ctx.textBaseline='middle';
    ctx.fillText(seasons[i],x.getPixelForValue(0)-8,yPos);
  });
  ctx.restore();
}};
new Chart(document.getElementById('c'),{type:'scatter',plugins:[dumbbellPlugin],data:{datasets:[{data:[]}]},
  options:{responsive:true,maintainAspectRatio:false,layout:{padding:{right:60,left:50,bottom:40}},
    plugins:{legend:{display:false},tooltip:{enabled:false}},
    scales:{
      x:{title:{display:true,text:'Avg Player Rating',color:'#888780',font:{size:11,family:FONT}},grid:{color:'rgba(136,135,128,0.15)'},ticks:{color:'#888780',font:{size:11,family:FONT}},min:0,max:24},
      y:{display:false,min:0,max:3}
    }}});
</script>
</body>
</html>
