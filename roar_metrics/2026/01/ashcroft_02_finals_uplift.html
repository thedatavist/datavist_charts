<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ashcroft: Finals Uplift</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', Arial, sans-serif; padding: 24px; max-width: 800px; margin: 0 auto; background: #fff; color: #1a1a1a; }
  .footer { font-size: 10px; color: #B4B2A9; display: flex; justify-content: space-between; margin-top: 8px; }
  .legend { display: flex; gap: 20px; margin-bottom: 16px; font-size: 12px; color: #666; }
  .legend span { display: flex; align-items: center; gap: 6px; }
  .swatch { width: 12px; height: 12px; display: inline-block; }
</style>
</head>
<body>
<p style="font-size:20px;font-weight:700;margin:1rem 0 4px;">Same player, same ball but a completely different impact</p>
<p style="font-size:13px;color:#666;margin:0 0 4px;">Ashcroft's key metrics, 2025 regular season vs 2025 finals series</p>
<p style="font-size:12px;color:#666;margin:0 0 16px;">Disposals barely change. What he does with them does.</p>
<div class="legend">
  <span><span class="swatch" style="background:#B5D4F4;border:1.5px solid #378ADD;"></span>Regular Season</span>
  <span><span class="swatch" style="background:#D85A30;border:1.5px solid #993C1D;"></span>Finals</span>
</div>
<div style="position:relative;width:100%;height:420px;"><canvas id="c"></canvas></div>
<div class="footer"><span>Visual: Darragh Murray</span><span>Source: fitzRoy</span></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const FONT="'Inter',Arial,sans-serif";
const metrics=[['Player','Rating'],['Disposals',''],['Clearances',''],['Metres per','Disposal'],['Score Inv per','Disposal %'],['Inside 50s','']];
const regular=[11.7,27.0,5.5,11.6,23.0,4.0];
const finals=[18.88,27.5,7.0,17.7,31.8,7.0];
const upliftPlugin={id:'ul',afterDatasetsDraw(chart){
  const{ctx}=chart;ctx.save();
  regular.forEach((_,i)=>{
    const finBar=chart.getDatasetMeta(1).data[i];
    const diff=finals[i]-regular[i];
    const pct=(diff/regular[i]*100).toFixed(0);
    if(Math.abs(diff)<0.3){
      ctx.font=`500 10px ${FONT}`;ctx.fillStyle='#888780';ctx.textAlign='center';ctx.textBaseline='bottom';
      ctx.fillText('flat',finBar.x,finBar.y-4);
    } else {
      ctx.font=`700 11px ${FONT}`;ctx.fillStyle='#993C1D';ctx.textAlign='center';ctx.textBaseline='bottom';
      ctx.fillText(`+${pct}%`,finBar.x,finBar.y-4);
    }
  });
  ctx.restore();
}};
new Chart(document.getElementById('c'),{type:'bar',plugins:[upliftPlugin],
  data:{labels:metrics,datasets:[
    {label:'Regular Season',data:regular,backgroundColor:'#B5D4F4CC',borderColor:'#378ADD',borderWidth:1.5,borderRadius:0,borderSkipped:false},
    {label:'Finals',data:finals,backgroundColor:'#D85A30CC',borderColor:'#993C1D',borderWidth:1.5,borderRadius:0,borderSkipped:false}
  ]},
  options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:28}},
    plugins:{legend:{display:false},tooltip:{callbacks:{
      title:ctx=>{const m=metrics[ctx[0].dataIndex];return m.filter(Boolean).join(' ');},
      label:ctx=>{const i=ctx.dataIndex;const isReg=ctx.datasetIndex===0;const val=isReg?regular[i]:finals[i];const pct=((finals[i]-regular[i])/regular[i]*100).toFixed(0);const lines=[` ${ctx.dataset.label}: ${val.toFixed(1)}`];if(!isReg&&Math.abs(finals[i]-regular[i])>=0.3)lines.push(` Uplift: +${pct}%`);return lines;}
    }}},
    scales:{
      x:{grid:{display:false},ticks:{color:'#888780',font:{size:11,family:FONT},maxRotation:0,minRotation:0}},
      y:{title:{display:true,text:'Value',color:'#888780',font:{size:11,family:FONT}},grid:{color:'rgba(136,135,128,0.15)'},ticks:{color:'#888780',font:{size:11,family:FONT}},min:0}
    }}});
</script>
</body>
</html>
